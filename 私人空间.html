// ── YOUTUBE HOVER PREVIEW ─────────────────────────────────────────────────────
function getYouTubePreviewUrl(videoId) {
  // YouTube animated WebP preview (6s loop, no audio)
  return `https://i.ytimg.com/an_webp/${videoId}/mqdefault_6s.webp`
}

function getYouTubeVideoId(url) {
  try {
    const p = new URL(url)
    let id = p.searchParams.get('v')
    if (!id && p.hostname.includes('youtu.be')) id = p.pathname.slice(1).split('?')[0]
    if (!id) { const m = p.pathname.match(/\/shorts\/([^/?]+)/); if(m) id = m[1] }
    return id || null
  } catch { return null }
}


// ── CATEGORY HELPERS ──────────────────────────────────────────────────────────
function getCatColor(name) {
  const cat = state.categories.find(c => c.name === name)
  return cat?.color || '#6b7280'
}
function getCatNames() {
  return state.categories.map(c => c.name)
}


// ── CATEGORY EDITOR ────────────────────────────────────────────────────────────
const CAT_PRESET_COLORS = ['#2d5be3','#1a7a4a','#e03e2d','#ba7517','#6b46c1',
  '#0891b2','#c13584','#475569','#6b7280','#d97706','#059669','#dc2626',
  '#7c3aed','#0284c7','#db2777','#16a34a']

let catEditTarget = null
let catEditColor = '#6b7280'

function openCatEditor(name) {
  catEditTarget = name
  const cat = state.categories.find(c => c.name === name)
  if (!cat) return
  catEditColor = cat.color || '#6b7280'
  document.getElementById('cat-edit-name').value = name
  document.getElementById('cat-custom-color').value = catEditColor
  // Render color grid
  const grid = document.getElementById('cat-color-grid')
  grid.innerHTML = CAT_PRESET_COLORS.map(col =>
    `<div onclick="selectCatColor('${col}')" style="width:28px;height:28px;border-radius:6px;background:${col};cursor:pointer;border:${catEditColor===col?'3px solid var(--text)':'2px solid transparent'};transition:border .1s"></div>`
  ).join('')
  document.getElementById('cat-editor-overlay').classList.add('open')
}

function selectCatColor(col) {
  catEditColor = col
  document.getElementById('cat-custom-color').value = col
  const grid = document.getElementById('cat-color-grid')
  grid.querySelectorAll('div').forEach((el,i) => {
    el.style.border = CAT_PRESET_COLORS[i] === col ? '3px solid var(--text)' : '2px solid transparent'
  })
}

document.addEventListener('change', function(e) {
  if (e.target.id === 'cat-custom-color') {
    catEditColor = e.target.value
    // Deselect preset
    document.getElementById('cat-color-grid')?.querySelectorAll('div').forEach(el => el.style.border = '2px solid transparent')
  }
})

function saveCatEdit() {
  const newName = document.getElementById('cat-edit-name').value.trim()
  if (!newName) return
  if (newName !== catEditTarget) renameCat(catEditTarget, newName)
  updateCatColor(newName !== catEditTarget ? newName : catEditTarget, catEditColor)
  closeCatEditor()
}

function closeCatEditor() {
  document.getElementById('cat-editor-overlay').classList.remove('open')
  catEditTarget = null
}
function closeCatEditorOutside(e) {
  if (e.target === document.getElementById('cat-editor-overlay')) closeCatEditor()
}


function renderSettingsCats() {
  const list = document.getElementById('settings-cat-list')
  if (!list) return
  list.innerHTML = state.categories.map((cat, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:var(--radius-sm)">
      <div onclick="settingsPickColor(${i})" style="width:20px;height:20px;border-radius:5px;background:${cat.color};cursor:pointer;flex-shrink:0;border:2px solid rgba(0,0,0,.1)"></div>
      <input value="${esc(cat.name)}" onchange="settingsRenamecat(${i},this.value)" style="flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit"/>
      <button onclick="deleteCat('${esc(cat.name)}');renderSettingsCats()" style="color:var(--text3);font-size:16px;line-height:1;background:none;border:none;cursor:pointer">×</button>
    </div>`).join('')
}
function settingsRenamecat(idx, newName) {
  const old = state.categories[idx]?.name
  if (old && newName && newName !== old) renameCat(old, newName)
}
function settingsPickColor(idx) {
  catEditTarget = state.categories[idx]?.name
  if (!catEditTarget) return
  openCatEditor(catEditTarget)
  closeCatEditor()
  // Just open color part inline - reuse openCatEditor
  openCatEditor(catEditTarget)
}
function settingsAddCat() {
  const inp = document.getElementById('settings-new-cat-inp')
  const val = inp.value.trim()
  if (!val) return
  if (state.categories.find(c => c.name === val)) { alert('分类已存在'); return }
  state.categories.push({name: val, color: '#6b7280'})
  saveState(); render(); renderSettingsCats()
  inp.value = ''
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') }
function fmtDate(iso) {
  const d=new Date(iso),diff=Date.now()-d.getTime(),days=Math.floor(diff/86400000)
  if(days===0) return '今天'; if(days===1) return '昨天'; if(days<7) return `${days}天前`; if(days<30) return `${Math.floor(days/7)}周前`
  return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'})
}

loadState()
render()
document.getElementById('settings-overlay').classList.remove('open')
document.getElementById('cat-editor-overlay').classList.remove('open')

  }
})
